# Compila instalador Windows (NSIS + MSI) en la nube.
# En GitHub: pestaña Actions -> en la COLUMNA IZQUIERDA elige este workflow -> Run workflow.
# NO uses "New workflow" ni las plantillas de Azure (eso es otra cosa).

name: Build Windows installer (Tauri)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tauri-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        working-directory: resortes-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: resortes-desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: resortes-desktop/src-tauri -> target
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (NSIS + MSI)
        run: npm run tauri:build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resortes-windows-installers
          path: resortes-desktop/src-tauri/target/release/bundle/
          if-no-files-found: error
